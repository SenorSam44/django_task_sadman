services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "pdm install && pdm run python manage.py migrate && pdm run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/booking_sync
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: your-secret-key-here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "pdm install && pdm run celery -A config worker -l info"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/booking_sync
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: your-secret-key-here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "pdm install && pdm run celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/booking_sync
      CELERY_BROKER_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: your-secret-key-here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: booking_sync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

# FIX: volumes section was missing — docker compose up would fail without it
volumes:
  pgdata:
